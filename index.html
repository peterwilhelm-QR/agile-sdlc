<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agile Release Cycle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(100px, 10vh, 140px) clamp(32px, 4vw, 64px);
    }

    .diagram {
      position: relative;
      width: 100%;
      max-width: 94vw;
    }

    .row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* ── Arrows between stages ── */
    .arrow {
      font-size: clamp(.8rem, 1.2vw, 1.4rem);
      color: #9ca3af;
      padding: 0 clamp(6px, 1vw, 18px);
      padding-top: clamp(24px, 3.2vw, 48px);
      flex-shrink: 0;
      user-select: none;
    }

    /* ── Stage column ── */
    .stage {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      filter: grayscale(1) opacity(0.35);
      transition: filter 0.3s ease;
      user-select: none;
    }
    .stage:hover  { filter: grayscale(0.5) opacity(0.65); }
    .stage.active { filter: none; }

    /* ── Phase circle ── */
    .circ {
      width: clamp(54px, 6vw, 150px);
      height: clamp(54px, 6vw, 150px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(.9rem, 1.65vw, 2.4rem);
      border: 2px solid transparent;
      transition: border-color .3s, box-shadow .3s;
    }
    .stage.active .circ {
      border-color: rgba(0,0,0,.12);
      box-shadow: 0 0 clamp(16px, 2.5vw, 36px) var(--glow);
    }

    .lbl {
      font-size: clamp(.6rem, .75vw, 1.5rem);
      font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      margin-top: clamp(5px, .8vw, 18px);
    }
    .sub {
      font-size: clamp(.45rem, .55vw, 1.1rem);
      letter-spacing: .1em; text-transform: uppercase; opacity: .65;
      margin-top: 3px; margin-bottom: clamp(8px, 1.2vw, 24px);
    }

    /* ── Content card ── */
    .card {
      width: 100%;
      background: #f3f4f8;
      border: 1px solid #dde1ee;
      border-radius: clamp(8px, 1vw, 16px);
      padding: clamp(10px, 1.2vw, 20px) clamp(8px, 1vw, 16px);
    }

    /* ════════════ PLANNING ════════════ */
    .st-plan { flex: 1.05; --glow: rgba(99,102,241,.5); }
    .st-plan .circ { background: radial-gradient(circle at 36% 32%, #4f46e5, #1e1b4b); }
    .st-plan .lbl  { color: #4338ca; }

    .feat-grid { display: flex; flex-direction: column; gap: clamp(4px, .5vw, 8px); }

    .sect-lbl {
      font-size: clamp(.42rem, .5vw, .68rem);
      letter-spacing: .14em; text-transform: uppercase; color: rgba(0,0,0,.5);
      margin-bottom: 1px;
    }

    .feat-row { display: flex; gap: clamp(4px, .5vw, 8px); }

    .f {
      width: clamp(13px, 1.6vw, 26px);
      height: clamp(13px, 1.6vw, 26px);
      border-radius: 3px;
    }
    .f.on  { background: #6366f1; box-shadow: 0 0 5px rgba(99,102,241,.45); }
    .f.off { background: #d1d5e8; border: 1.5px solid #a8afc8; }

    .feat-div {
      height: 1px; background: rgba(0,0,0,.12);
      margin: clamp(3px, .5vw, 7px) 0;
    }

    /* ════════════ SPRINT ════════════ */
    .st-sprint { flex: 2; --glow: rgba(34,197,94,.35); }

    .sprint-head {
      display: flex; align-items: flex-end;
      justify-content: center; gap: clamp(8px, 1.5vw, 24px);
    }

    .sub-stage {
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(3px, .5vw, 8px);
    }

    .circ-sm {
      width: clamp(54px, 6vw, 150px);
      height: clamp(54px, 6vw, 150px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(.9rem, 1.65vw, 2.4rem);
      border: 2px solid transparent;
      transition: border-color .3s, box-shadow .3s;
    }
    .st-sprint.active .dev-c { border-color: rgba(34,197,94,.3); box-shadow: 0 0 18px rgba(34,197,94,.35); }
    .st-sprint.active .qa-c  { border-color: rgba(245,158,11,.3); box-shadow: 0 0 18px rgba(245,158,11,.35); }
    .dev-c { background: radial-gradient(circle at 36% 32%, #15803d, #052e16); }
    .qa-c  { background: radial-gradient(circle at 36% 32%, #b45309, #451a03); }

    .swap { font-size: clamp(.9rem, 1.4vw, 1.8rem); color: #9ca3af; padding-bottom: clamp(6px, 1vw, 14px); }

    .dev-lbl { font-size: clamp(.6rem, .75vw, 1.5rem); font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #15803d; }
    .qa-lbl  { font-size: clamp(.6rem, .75vw, 1.5rem); font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #b45309; }

    /* Story pool */
    .sp-hidden { opacity: 0; }
    .pool-wrapper { display: flex; gap: clamp(8px, 1.2vw, 20px); align-items: flex-start; margin: 3px 0 2px; }
    .feat-col { display: flex; flex-direction: column; align-items: flex-start; gap: clamp(3px, .45vw, 7px); }
    .pool-dots { display: flex; gap: clamp(2px, .3vw, 5px); }
    .sg-gap { width: clamp(5px, .8vw, 14px); flex-shrink: 0; }
    .sdot { width: clamp(8px, 1vw, 16px); height: clamp(8px, 1vw, 16px); border-radius: 50%; flex-shrink: 0; }
    .sdot.done { background: #22c55e; }
    .sdot.prog { background: #f59e0b; }
    .sdot.fut  { background: #d1d5e8; border: 1px solid #a8afc8; }

    /* Sprint track */
    .track-hdr {
      display: flex; align-items: center; gap: clamp(4px, .6vw, 10px);
      padding: 0 clamp(5px, .7vw, 12px); margin-bottom: clamp(2px, .4vw, 6px);
    }
    .th-sp { width: clamp(44px, 5.5vw, 88px); flex-shrink: 0; }
    .th-col { font-size: clamp(.45rem, .52vw, .72rem); letter-spacing: .08em; text-transform: uppercase; color: rgba(0,0,0,.45); flex: 1; }

    .s-track { display: flex; flex-direction: column; gap: clamp(4px, .5vw, 8px); }

    .s-row {
      display: flex; align-items: center; gap: clamp(4px, .6vw, 10px);
      padding: clamp(4px, .5vw, 8px) clamp(5px, .7vw, 12px);
      border-radius: clamp(5px, .6vw, 10px);
      background: #eceef5; border: 1px solid #d1d5e8;
      transition: margin-left 0.2s;
    }
    .s-row.live { border-color: rgba(34,197,94,.4); background: rgba(34,197,94,.08); }
    .s-row.sp1 { margin-left: 0; }
    .s-row.sp2 { margin-left: clamp(10px, 1.2vw, 22px); }
    .s-row.sp3 { margin-left: clamp(20px, 2.4vw, 44px); }

    .s-id {
      font-size: clamp(.48rem, .56vw, .78rem); font-weight: 700; letter-spacing: .04em;
      color: rgba(0,0,0,.65); width: clamp(44px, 5.5vw, 88px); flex-shrink: 0;
      white-space: nowrap;
    }

    /* dev dots | divider | qa dots */
    .s-dev { display: flex; gap: clamp(2px, .3vw, 5px); }
    .s-qa  { display: flex; gap: clamp(2px, .3vw, 5px); }
    .s-sep { width: 1px; height: clamp(10px, 1.2vw, 20px); background: rgba(0,0,0,.15); margin: 0 clamp(2px, .4vw, 6px); flex-shrink: 0; }

    .d { width: clamp(7px, .9vw, 14px); height: clamp(7px, .9vw, 14px); border-radius: 50%; }
    .d.g { background: #22c55e; }
    .d.a { background: #f59e0b; }
    .d.x { background: #d1d5e8; border: 1px solid #a8afc8; }

    .s-ok  { font-size: clamp(.65rem, .8vw, 1.1rem); color: #22c55e; margin-left: auto; flex-shrink: 0; }
    .s-wip { font-size: clamp(.65rem, .8vw, 1.1rem); color: #22c55e; margin-left: auto; flex-shrink: 0; }

    .s-more {
      text-align: center; font-size: clamp(.6rem, .75vw, 1rem);
      color: rgba(0,0,0,.4); letter-spacing: .22em;
      margin-left: clamp(20px, 2.5vw, 44px);
    }

    /* ════════════ UAT ════════════ */
    .st-uat { flex: 1.05; --glow: rgba(6,182,212,.5); }
    .st-uat .circ { background: radial-gradient(circle at 36% 32%, #0891b2, #083344); }
    .st-uat .lbl  { color: #0e7490; }

    .uat-rows { display: flex; flex-direction: column; gap: clamp(4px, .6vw, 10px); }
    .uat-row {
      display: flex; align-items: center; gap: clamp(4px, .6vw, 10px);
      padding: clamp(4px, .5vw, 8px) clamp(5px, .7vw, 12px);
      border-radius: clamp(5px, .6vw, 10px);
      background: #eceef5; border: 1px solid #d1d5e8;
    }
    .fi {
      width: clamp(9px, 1.1vw, 18px); height: clamp(9px, 1.1vw, 18px);
      border-radius: 2px; flex-shrink: 0; background: #6366f1;
    }
    .fi.dim { opacity: .25; }
    .uat-bar { flex: 1; height: clamp(4px, .5vw, 8px); border-radius: 3px; background: #d1d5e8; overflow: hidden; }
    .uat-fill { height: 100%; border-radius: 3px; background: #06b6d4; transition: width 1.1s ease-in-out; }
    .ck { font-size: clamp(.6rem, .75vw, 1rem); flex-shrink: 0; }
    .ck.ok { color: #06b6d4; }
    .ck.w  { color: #f59e0b; }
    .ck.no { color: rgba(0,0,0,.3); }

    /* ════════════ DELIVERY ════════════ */
    .st-del { flex: 1.05; --glow: rgba(236,72,153,.5); }
    .st-del .circ { background: radial-gradient(circle at 36% 32%, #db2777, #4a044e); }
    .st-del .lbl  { color: #9d174d; }

    .del-inner {
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(10px, 1.4vw, 22px); padding: 4px 0;
    }
    .ver {
      display: flex; align-items: center; gap: clamp(5px, .7vw, 12px);
      font-family: monospace; font-size: clamp(.65rem, .85vw, 1.2rem);
    }
    .v-old { color: rgba(0,0,0,.35); text-decoration: line-through; }
    .v-arr { color: #db2777; }
    .v-new { color: #9d174d; font-weight: 700; }

    /* ── Blue/Green deployment slots ── */
    .bgd-envs { display:flex; flex-direction:column; gap:clamp(5px,.7vw,10px); width:100%; }
    .bgd-env  { display:flex; flex-direction:column; gap:clamp(2px,.3vw,4px); }
    .bgd-lbl  { font-size:clamp(.42rem,.5vw,.7rem); letter-spacing:.14em; text-transform:uppercase; color:rgba(0,0,0,.5); }
    .bgd-slots { display:flex; gap:clamp(4px,.5vw,8px); }
    .bgd-slot {
      flex:1; display:flex; align-items:center; gap:clamp(3px,.4vw,6px);
      padding:clamp(3px,.4vw,6px) clamp(4px,.55vw,8px);
      border-radius:clamp(4px,.5vw,8px); border:1.5px solid rgba(0,0,0,.15);
      font-family:monospace; font-size:clamp(.5rem,.62vw,.9rem); font-weight:600;
      color:rgba(0,0,0,.7); transition:filter .5s ease, border-color .3s ease;
      position:relative; overflow:visible;
    }
    .bgd-slot.inactive        { filter:saturate(0.12) opacity(0.4); }
    .bgd-slot.slot-live-blue  { border-color:#3b82f6; }
    .bgd-slot.slot-live-green { border-color:#22c55e; }
    .bgd-slot.slot-deploying  { border-style:dashed; border-color:#22c55e; }
    .bgd-dot { width:clamp(6px,.8vw,12px); height:clamp(6px,.8vw,12px); border-radius:50%; flex-shrink:0; }
    .bgd-dot.blue  { background:#3b82f6; }
    .bgd-dot.green { background:#22c55e; }
    .deploy-ring { position:absolute; top:-2px; left:-2px; pointer-events:none; display:none; overflow:visible; }
    .deploy-ring rect { fill:none; stroke:#22c55e; stroke-width:2.5; stroke-linecap:round; }

    /* ── Hover tooltip ── */
    #tip {
      position:fixed; display:none; pointer-events:none; z-index:9999;
      background:rgba(15,23,42,.93); color:#f1f5f9;
      font-size:clamp(.6rem,.68vw,.8rem); line-height:1.45;
      padding:6px 11px; border-radius:7px; max-width:230px;
      box-shadow:0 3px 12px rgba(0,0,0,.35);
    }
    [data-tip] { cursor:default; }

    /* ── Team callout ── */
    .callout {
      width: 100%;
      max-width: 94vw;
      margin: clamp(48px, 6vw, 96px) auto 0;
      opacity: 0;
      transition: opacity .3s ease;
      pointer-events: none;
      min-height: 260px;
    }
    .callout.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .callout-roles {
      display: flex;
      gap: clamp(12px, 1.5vw, 28px);
      align-items: stretch;
    }

    .role-card {
      flex: 1;
      background: #f3f4f8;
      border: 1px solid #dde1ee;
      border-radius: clamp(8px, 1vw, 16px);
      padding: clamp(14px, 1.5vw, 28px);
    }

    .role-name {
      font-size: clamp(.65rem, .8vw, 1.1rem);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: clamp(10px, 1vw, 18px);
      padding-bottom: clamp(8px, .8vw, 14px);
      border-bottom: 1px solid #dde1ee;
    }

    .role-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: clamp(6px, .7vw, 12px);
    }

    .role-items li {
      font-size: clamp(.6rem, .72vw, 1rem);
      color: rgba(0,0,0,.7);
      line-height: 1.5;
      padding-left: clamp(10px, 1vw, 16px);
      position: relative;
    }

    .role-items li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: rgba(0,0,0,.3);
    }

    /* ── Stage header normalisation ── */
    .stage-hd {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      min-height: clamp(90px, 10vw, 180px);
      width: 100%;
    }

    /* ── SVG overlay ── */
    .loops-svg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; overflow: visible; z-index: 1;
    }
    @keyframes dash-flow { to { stroke-dashoffset: -22; } }

    /* ── Planning backlog → release animation ── */
    @keyframes arrive-item {
      0%   { transform: translateY(14px) scale(0.3); opacity: 0; }
      65%  { transform: translateY(-3px) scale(1.15); opacity: 1; }
      100% { transform: translateY(0)    scale(1);    opacity: 1; }
    }
    @keyframes depart-item {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(0.1); opacity: 0; }
    }
    .arriving           { animation: arrive-item .45s cubic-bezier(.22,1.2,.36,1) forwards; }
    .plan-bl.departing  { animation: depart-item .3s ease-in forwards; }

    @keyframes pool-arrive {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .sdot.pool-arrive { animation: pool-arrive .35s cubic-bezier(.22,1.2,.36,1) forwards; }

    /* ── Sprint dot animations ── */
    @keyframes dot-arrive {
      0%   { transform: scale(0.15); opacity: 0; }
      65%  { transform: scale(1.3);  opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes pool-pulse {
      0%   { transform: scale(1);   }
      45%  { transform: scale(1.55); }
      100% { transform: scale(1);   }
    }
    .d.dot-arrive    { animation: dot-arrive .38s cubic-bezier(.22,1.2,.36,1) forwards; }
    .sdot.pool-pulse { animation: pool-pulse .55s ease-out; }
  </style>
</head>
<body>
<div class="diagram" id="diagram">
  <div class="row" id="row">

    <!-- ── Planning ── -->
    <div class="stage st-plan active" id="stage-planning" onclick="activate('planning')">
      <div class="stage-hd">
        <div class="circ">🗺</div>
        <div class="lbl">Planning</div>
        <div class="sub">Release</div>
      </div>
      <div class="card">
        <div class="feat-grid">
          <div class="sect-lbl">this release</div>
          <div class="feat-row">
            <div class="f off plan-slot" id="ps0" data-tip="Release feature — selected for this release and subsequently broken down into user stories for development"></div>
            <div class="f off plan-slot" id="ps1" data-tip="Release feature — selected for this release and subsequently broken down into user stories for development"></div>
            <div class="f off plan-slot" id="ps2" data-tip="Release feature — selected for this release and subsequently broken down into user stories for development"></div>
            <div class="f off plan-slot" id="ps3" data-tip="Release feature — selected for this release and subsequently broken down into user stories for development"></div>
          </div>
          <div class="feat-div"></div>
          <div class="sect-lbl">backlog</div>
          <div class="feat-row">
            <div class="f off plan-bl" id="pb0" data-tip="Backlog item — considered but not selected for this release; prioritised for a future release"></div>
            <div class="f off plan-bl" id="pb1" data-tip="Backlog item — considered but not selected for this release; prioritised for a future release"></div>
            <div class="f off plan-bl" id="pb2" data-tip="Backlog item — considered but not selected for this release; prioritised for a future release"></div>
            <div class="f off plan-bl" id="pb3" data-tip="Backlog item — considered but not selected for this release; prioritised for a future release"></div>
          </div>
          <div class="feat-row" style="margin-top:clamp(3px,.4vw,6px)">
            <div class="f off"></div><div class="f off"></div><div class="f off"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="arrow">→</div>

    <!-- ── Sprint: Dev + QA ── -->
    <div class="stage st-sprint" id="stage-sprint" onclick="activate('sprint')">
      <div class="stage-hd">
        <div class="sprint-head">
          <div class="sub-stage">
            <div class="circ-sm dev-c">⚙️</div>
            <div class="dev-lbl">Dev</div>
          </div>
          <div class="swap">⇄</div>
          <div class="sub-stage">
            <div class="circ-sm qa-c">🔬</div>
            <div class="qa-lbl">QA</div>
          </div>
        </div>
        <div class="sub" style="margin-top:8px;">Sprint</div>
      </div>
      <div class="card">
        <!-- Story pool: each feature seed above its own story dots -->
        <div class="sect-lbl">stories this release</div>
        <div class="pool-wrapper">
          <div class="feat-col" data-tip="Feature — the box is a release feature; each dot below is a user story derived from it">
            <div class="f on sp-hidden" id="fseed0"></div>
            <div class="pool-dots">
              <div class="sdot fut sp-hidden" id="pg1-0"></div>
              <div class="sdot fut sp-hidden" id="pg1-1"></div>
              <div class="sdot fut sp-hidden" id="pg1-2"></div>
            </div>
          </div>
          <div class="feat-col" data-tip="Feature — the box is a release feature; each dot below is a user story derived from it">
            <div class="f on sp-hidden" id="fseed1"></div>
            <div class="pool-dots">
              <div class="sdot fut sp-hidden" id="pg2-0"></div>
              <div class="sdot fut sp-hidden" id="pg2-1"></div>
              <div class="sdot fut sp-hidden" id="pg2-2"></div>
            </div>
          </div>
          <div class="feat-col" data-tip="Feature — the box is a release feature; each dot below is a user story derived from it">
            <div class="f on sp-hidden" id="fseed2"></div>
            <div class="pool-dots">
              <div class="sdot fut sp-hidden" id="pg3-0"></div>
              <div class="sdot fut sp-hidden" id="pg3-1"></div>
              <div class="sdot fut sp-hidden" id="pg3-2"></div>
            </div>
          </div>
          <div class="feat-col" data-tip="Feature — the box is a release feature; each dot below is a user story derived from it">
            <div class="f on sp-hidden" id="fseed3"></div>
            <div class="pool-dots">
              <div class="sdot fut sp-hidden" id="pg4-0"></div>
              <div class="sdot fut sp-hidden" id="pg4-1"></div>
              <div class="sdot fut sp-hidden" id="pg4-2"></div>
            </div>
          </div>
        </div>

        <div class="feat-div" style="margin:8px 0 6px;"></div>

        <!-- Column headers -->
        <div class="track-hdr">
          <div class="th-sp"></div>
          <div class="th-col" data-tip="Dev — each dot represents a user story being built and unit-tested">⚙ dev</div>
          <div class="th-col" data-tip="QA — each dot represents a story being tested against its acceptance criteria">🔬 qa</div>
        </div>

        <div class="s-track">
          <div class="s-row sp1" id="srow1" data-tip="Sprint — a two-week development cycle composed of stories that will provide new incremental value that will be demoed at sprint close, after which the next sprint is planned and executed">
            <span class="s-id">Sprint 1</span>
            <div class="s-dev"><div class="d x sp-hidden" id="s1d0"></div><div class="d x sp-hidden" id="s1d1"></div><div class="d x sp-hidden" id="s1d2"></div><div class="d x sp-hidden" id="s1d3"></div></div>
            <div class="s-sep"></div>

            <div class="s-sep"></div>

            <span class="v-new">v2.5</span>

              <div class="bgd-lbl">staging</div>
              <div class="bgd-slots">
                <div class="bgd-slot" id="st-a" data-tip="Blue slot — currently live on staging, serving v2.4"><div class="bgd-dot blue"></div><span id="st-a-ver">v2.4</span></div>
                <div class="bgd-slot inactive" id="st-b" data-tip="Green slot — v2.5 deploys here; the border ring shows deployment progress; traffic switches when the ring completes"><div class="bgd-dot green"></div><span id="st-b-ver">–</span><svg class="deploy-ring" id="st-b-ring"><rect/></svg></div>

            </div>
            <div class="bgd-env" data-tip="Production — the live environment serving end users; only updated after staging validation passes">

                <div class="bgd-slot inactive" id="pr-b" data-tip="Green slot — v2.5 goes live here after staging validation; zero downtime as traffic switches between slots"><div class="bgd-dot green"></div><span id="pr-b-ver">–</span><svg class="deploy-ring" id="pr-b-ring"><rect/></svg></div>

<!-- ── Team callout ── -->
<div class="callout" id="callout">
  <div class="callout-roles" id="callout-roles"></div>
</div>

<script>
  const callouts = {
    planning: {
      color: '#4338ca',
      roles: [
        {
          name: 'Product Owner',
          items: [
            'Define and prioritize the feature list for the release',
            'Gather and consolidate input from SMEs into firm, final requirements for every feature selected for inclusion',
            'Own and approve acceptance criteria for each feature',
            'Resolve any requirements conflicts or ambiguities — no feature enters development without complete, PO-approved requirements',
            'Formally baseline and sign off on release scope before planning closes',
          ]
        },
        {
          name: 'SME',
          items: [
            'Provide subject matter input on business rules, processes, and edge cases',
            'Respond to PO queries to support requirements definition',
            'Review requirements drafted by the PO to confirm their input has been accurately captured',
            'Flag any gaps or misrepresentations to the PO for resolution — within the planning phase',
          ]
        },
        {
          name: 'QR',
          items: [
            'Facilitate the planning process and requirements workshops',
            'Challenge and probe requirements for completeness, clarity, and testability',
            'Translate approved requirements into user stories ready for development',
            'Estimate effort and flag any requirements that are unclear or incomplete',
            'Present proposed release scope and sprint structure for approval',
            'Obtain formal PO sign-off before planning phase closes',
          ]
        },
      ]
    },
    sprint: {
      color: '#15803d',
      roles: [
        {
          name: 'Product Owner',
          items: [
            'Be available to answer clarifying questions from QR during development',
            'Review and approve completed user stories at the end of each sprint demo',
            'Provide timely decisions on any minor ambiguities that surface during development',
            'Capture any new feature ideas or changed requirements that emerge during the sprint cycle as new user stories, prioritize them in the backlog, and ensure they are considered for a future release',
          ]
        },
        {
          name: 'SME',
          items: [
            'Attend sprint demos when invited to observe progress against the agreed requirements',
            'Channel feedback on delivered functionality through the PO, who will coordinate prioritization and share with QR as appropriate',
            'Participate in sprint demos and provide timely feedback to support the PO in evaluating delivered functionality',
          ]
        },
        {
          name: 'QR',
          items: [
            'Develop user stories in accordance with the approved, baselined requirements',
            'Develop and unit test each user story to confirm the implementation matches the story definition',
            'Verify each completed story against its acceptance criteria before presenting at the sprint demo',
            'Conduct QA testing against the agreed acceptance criteria for each story',
            'Raise a formal query to the PO if any requirement is found to be genuinely ambiguous or incomplete during development',
            'Deliver a sprint demo at the end of each two-week sprint to showcase completed stories and gather approval',
            'Maintain the sprint tracker and report progress against the release plan',
          ]
        },
      ]
    },
    uat: {
      color: '#0e7490',
      roles: [
        {
          name: 'Product Owner',
          items: [
            'Own and coordinate the UAT process end to end',
            'Ensure the right stakeholders and SMEs are selected to participate in UAT',
            'Participate in triage calls to assess severity of reported defects and determine whether items represent genuine defects or enhancement requests for future consideration',
            'Make final call on whether defects are release-blocking or can be deferred',
            'Provide formal sign-off that the release is ready for delivery',
          ]
        },
        {
          name: 'SME',
          items: [
            'Execute UAT test scenarios against the agreed acceptance criteria',
            'Raise defects and observations through the agreed process, with assurance that all feedback will be collected, reviewed, and categorized appropriately',
            'Understand that new requirements or scope changes identified during UAT will be logged for a future release, not incorporated into the current one',
            'Provide timely feedback within the UAT window to avoid delays to delivery',
          ]
        },
        {
          name: 'QR',
          items: [
            'Plan the UAT process including test scenarios, test coverage, and the overall UAT execution plan, then prepare and deploy the release candidate to the UAT environment',
            'Support the PO and SMEs during UAT by answering questions and investigating reported defects',
            'Triage and fix confirmed defects within the agreed UAT window',
            'Distinguish clearly between defects against agreed requirements and requests for new functionality',
            'Confirm when defects are resolved and the build is ready for PO sign-off',
          ]
        },
      ]
    },
    delivery: {
      color: '#9d174d',
      roles: [
        {
          name: 'Product Owner',
          items: [
            'Provide final approval to proceed with production deployment',
            'Communicate the release to relevant stakeholders',
            'Confirm post-deployment that the release meets expectations',
            'Close out the release and feed any deferred items into the backlog for future planning',
          ]
        },
        {
          name: 'SME',
          items: [
            'Be available during and immediately after deployment to support any business-side validation',
            'Confirm from a business operations perspective that the release is performing as expected',
            'Log any post-deployment observations through the agreed process for future consideration',
          ]
        },
        {
          name: 'QR',
          items: [
            'Execute the production deployment in accordance with the agreed deployment plan',
            'Confirm successful deployment across staging and production environments',
            'Monitor for any post-deployment issues and respond to any incidents within agreed response times',
            'Provide a deployment summary to the PO on completion',
            'Transition any outstanding items, known issues, or deferred requirements into the backlog ready for the next planning phase',
          ]
        },
      ]
    },
  };

  let current = 'planning';

  function activate(id) {
    if (current === id) return;
    const prev = current;
    current = id;
    document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
    document.getElementById('stage-' + id).classList.add('active');
    if (prev === 'planning') planFreeze();
    if (id  === 'planning') planRestartAnim();
    if (prev === 'sprint')   sprintFreeze();
    if (id  === 'sprint')   sprintRestartAnim();
    if (prev === 'uat')     uatFreeze();
    if (id  === 'uat')     uatRestartAnim();
    if (prev === 'delivery') delFreeze();
    if (id  === 'delivery') delRestartAnim();
    renderCallout(id);
    drawLoops();
  }

  function planFreeze() {
    clearTimeout(planTimer);
    planTimer = null;
    PLAN_SLOTS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'f on plan-slot';
    });
    PLAN_BL.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.opacity = '0';
    });
  }

  function planRestartAnim() {
    clearTimeout(planTimer);
    PLAN_SLOTS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'f off plan-slot';
    });
    PLAN_BL.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.className = 'f off plan-bl'; el.style.opacity = ''; }
    });
    planStep = 0;
    planTimer = setTimeout(planMoveNext, 600);
  }

  function renderCallout(id) {
    const data = callouts[id];
    const callout = document.getElementById('callout');
    const rolesEl = document.getElementById('callout-roles');

    if (!data) {
      callout.classList.remove('visible');
      return;
    }

    rolesEl.innerHTML = data.roles.map(role => `
      <div class="role-card">
        <div class="role-name" style="color:${data.color}">${role.name}</div>
        <ul class="role-items">
          ${role.items.map(item => `<li>${item}</li>`).join('')}
        </ul>
      </div>
    `).join('');

    callout.classList.add('visible');
  }

  // Initial state on load
  window.addEventListener('load', () => {
    renderCallout('planning');
    sprintFreeze();
    uatFreeze();
    delFreeze();
    planTimer = setTimeout(planMoveNext, 900);
  });

  function mk(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }

  function arrowPoly(x, y, dir, col) {
    const p = mk('polygon'), s = 5;
    const pts = {
      right: `${x-s},${y-s} ${x+s},${y} ${x-s},${y+s}`,
      left:  `${x+s},${y-s} ${x-s},${y} ${x+s},${y+s}`,
      up:    `${x-s},${y+s} ${x},${y-s} ${x+s},${y+s}`,
      down:  `${x-s},${y-s} ${x},${y+s} ${x+s},${y-s}`,
    };
    p.setAttribute('points', pts[dir]);
    p.setAttribute('fill', col);
    return p;
  }

  function drawLoops() {
    const svg = document.getElementById('loops-svg');
    svg.innerHTML = '';
    const dRect = document.getElementById('diagram').getBoundingClientRect();

    const L = id => document.getElementById(id).getBoundingClientRect().left  - dRect.left;
    const R = id => document.getElementById(id).getBoundingClientRect().right - dRect.left;
    const T = id => document.getElementById(id).getBoundingClientRect().top   - dRect.top;
    const B = id => document.getElementById(id).getBoundingClientRect().bottom - dRect.top;

    // ── Release cycle oval ──
    const lx = L('stage-planning') - 12;
    const rx = R('stage-delivery') + 12;
    const ty = T('stage-planning') - 22;
    const by = Math.max(B('stage-planning'), B('stage-sprint'), B('stage-uat'), B('stage-delivery')) + 22;
    const bul = 32;
    const mx  = (lx + rx) / 2;

    const oval = mk('path');
    oval.setAttribute('d', `M ${lx} ${ty} C ${lx} ${ty-bul},${rx} ${ty-bul},${rx} ${ty}
                             L ${rx} ${by} C ${rx} ${by+bul},${lx} ${by+bul},${lx} ${by} Z`);
    oval.setAttribute('fill', 'none');
    oval.setAttribute('stroke', 'rgba(99,102,241,.45)');
    oval.setAttribute('stroke-width', '1.5');
    oval.setAttribute('stroke-dasharray', '7 4');
    svg.appendChild(oval);

    // arrows on oval
    svg.appendChild(arrowPoly(mx, ty-bul+5, 'right', 'rgba(99,102,241,.6)'));
    svg.appendChild(arrowPoly(mx, by+bul-5, 'left',  'rgba(99,102,241,.6)'));

    // release cycle label
    const labelSize = Math.round(Math.min(Math.max(12, window.innerWidth * 0.009), 26));
    const rl = mk('text');
    rl.setAttribute('x', mx); rl.setAttribute('y', ty-bul-10);
    rl.setAttribute('text-anchor', 'middle'); rl.setAttribute('font-size', labelSize);
    rl.setAttribute('font-weight', '700'); rl.setAttribute('letter-spacing', '2');
    rl.setAttribute('fill', '#4338ca');
    rl.setAttribute('font-family', 'system-ui,sans-serif');
    rl.textContent = 'RELEASE CYCLE';
    svg.appendChild(rl);

    // HTML overlay for the RELEASE CYCLE tooltip (SVG pointer-events can't pierce pointer-events:none on the SVG root)
    const RC_TIP = 'Release cycle — a product grows through a planned sequence of releases, each scoped to deliver the highest-value capabilities to the business and its customers as early as possible';
    let rcOverlay = document.getElementById('rc-tip-overlay');
    if (!rcOverlay) {
      rcOverlay = document.createElement('div');
      rcOverlay.id = 'rc-tip-overlay';
      rcOverlay.style.cssText = 'position:absolute;pointer-events:none;z-index:2;';
      rcOverlay.dataset.tip = RC_TIP;
      document.getElementById('diagram').appendChild(rcOverlay);
    }
    const approxW = labelSize * 9.2;
    rcOverlay.style.left   = (mx - approxW / 2) + 'px';
    rcOverlay.style.top    = (ty - bul - labelSize - 18) + 'px';
    rcOverlay.style.width  = approxW + 'px';
    rcOverlay.style.height = (labelSize + 14) + 'px';

  }

  window.addEventListener('load', drawLoops);
  window.addEventListener('resize', drawLoops);

  // ── Sprint animation ──
  let spActive = false;
  let spTimer  = null;

  const POOL_GROUPS = [
    { seedId: 'fseed0', ids: ['pg1-0','pg1-1','pg1-2'] },
    { seedId: 'fseed1', ids: ['pg2-0','pg2-1','pg2-2'] },
    { seedId: 'fseed2', ids: ['pg3-0','pg3-1','pg3-2'] },
    { seedId: 'fseed3', ids: ['pg4-0','pg4-1','pg4-2'] },
  ];

  // Stories per sprint — cross-feature: each sprint draws from multiple feature groups
  const SP_STORIES = [
    [ {pool:'pg1-0',dev:'s1d0',qa:'s1q0',dc:'g',qc:'g'},
      {pool:'pg2-0',dev:'s1d1',qa:'s1q1',dc:'g',qc:'g'},
      {pool:'pg3-0',dev:'s1d2',qa:'s1q2',dc:'g',qc:'g'},
      {pool:'pg4-0',dev:'s1d3',qa:'s1q3',dc:'g',qc:'g'} ],
    [ {pool:'pg1-1',dev:'s2d0',qa:'s2q0',dc:'g',qc:'g'},
      {pool:'pg2-1',dev:'s2d1',qa:'s2q1',dc:'g',qc:'g'},
      {pool:'pg3-1',dev:'s2d2',qa:'s2q2',dc:'g',qc:'g'},
      {pool:'pg4-1',dev:'s2d3',qa:'s2q3',dc:'g',qc:'g'} ],
    [ {pool:'pg1-2',dev:'s3d0',qa:'s3q0',dc:'g',qc:'g'},
      {pool:'pg2-2',dev:'s3d1',qa:'s3q1',dc:'g',qc:'g'},
      {pool:'pg3-2',dev:'s3d2',qa:'s3q2',dc:'g',qc:'g'},
      {pool:'pg4-2',dev:'s3d3',qa:'s3q3',dc:'g',qc:'g'} ],
  ];
  const SP_STATUS = ['s1-ok','s2-ok','s3-wip'];
  const SP_ROWS   = ['srow1','srow2','srow3'];

  function sprintRestartAnim() {
    spActive = true;
    clearTimeout(spTimer);
    spFullReset();
    spTimer = setTimeout(spPhase1, 500);
  }

  function sprintFreeze() {
    spActive = false;
    clearTimeout(spTimer);
    // Hide seeds
    POOL_GROUPS.forEach(({seedId}) => {
      const el = document.getElementById(seedId);
      if (el) el.classList.add('sp-hidden');
    });
    // Show all pool dots as done (all 11 stories are in sprints)
    POOL_GROUPS.forEach(({ids}) => ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'sdot done';
    }));
    // Sprint rows static completed state (all green, no amber)
    const dotMap = {
      s1d0:'g',s1d1:'g',s1d2:'g',s1d3:'g', s1q0:'g',s1q1:'g',s1q2:'g',s1q3:'g',
      s2d0:'g',s2d1:'g',s2d2:'g',s2d3:'g', s2q0:'g',s2q1:'g',s2q2:'g',s2q3:'g',
      s3d0:'g',s3d1:'g',s3d2:'g',s3d3:'g', s3q0:'g',s3q1:'g',s3q2:'g',s3q3:'g',
    };
    Object.entries(dotMap).forEach(([id,c]) => {
      const el = document.getElementById(id); if (el) el.className = `d ${c}`;
    });
    SP_STATUS.forEach(id => { const el=document.getElementById(id); if(el){el.style.opacity='1';el.style.transition='';} });
    SP_ROWS.forEach(id   => { const el=document.getElementById(id); if(el){el.style.filter='';el.style.transition='';} });
  }

  function spFullReset() {
    // Hide seeds individually via class
    POOL_GROUPS.forEach(({seedId}) => {
      const el = document.getElementById(seedId);
      if (el) el.classList.add('sp-hidden');
    });
    // Hide and reset pool dots
    POOL_GROUPS.forEach(({ids}) => ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'sdot fut sp-hidden';
    }));
    SP_STORIES.forEach((stories, si) => {
      stories.forEach(s => {
        const d=document.getElementById(s.dev); if(d) d.className='d x sp-hidden';
        const q=document.getElementById(s.qa);  if(q) q.className='d x sp-hidden';
      });
      const st=document.getElementById(SP_STATUS[si]); if(st){st.style.opacity='0';st.style.transition='';}
      const row=document.getElementById(SP_ROWS[si]);   if(row){row.style.filter='';row.style.transition='';}
    });
  }

  // Phase 1: feature seeds appear one by one
  function spPhase1() {
    if (!spActive) return;
    POOL_GROUPS.forEach(({seedId}, i) => {
      setTimeout(() => {
        if (!spActive) return;
        const el = document.getElementById(seedId);
        if (el) {
          el.classList.remove('sp-hidden');
          el.classList.add('arriving');
          setTimeout(() => el.classList.remove('arriving'), 450);
        }
      }, i * 160);
    });
    spTimer = setTimeout(spPhase2, POOL_GROUPS.length * 160 + 480);
  }

  // Phase 2: each seed blooms into its story dots
  function spPhase2() {
    if (!spActive) return;
    let delay = 0;
    POOL_GROUPS.forEach(({seedId, ids}, gi) => {
      setTimeout(() => {
        if (!spActive) return;
        const seed = document.getElementById(seedId);
        if (seed) { seed.classList.add('pool-pulse'); setTimeout(() => seed.classList.remove('pool-pulse'), 600); }
        ids.forEach((id, di) => {
          setTimeout(() => {
            if (!spActive) return;
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('sp-hidden');
            el.classList.add('pool-arrive');
            setTimeout(() => el.classList.remove('pool-arrive'), 420);
          }, di * 150);
        });
      }, delay);
      delay += ids.length * 150 + 360;
    });
    spTimer = setTimeout(() => spPhase3(0), delay + 300);
  }

  // Phase 3: fill sprints story-by-story, cross-feature
  function spPhase3(si) {
    if (!spActive) return;
    if (si >= SP_STORIES.length) {
      spTimer = setTimeout(() => {
        if (!spActive) return;
        spFullReset();
        spTimer = setTimeout(spPhase1, 600);
      }, 1800);
      return;
    }
    const stories = SP_STORIES[si];
    const STORY_MS = 460, QA_LAG = 240;

    stories.forEach((story, i) => {
      const t = i * STORY_MS;
      // Pool dot pulses first
      setTimeout(() => {
        if (!spActive) return;
        const p = document.getElementById(story.pool);
        if (p) { p.classList.add('pool-pulse'); setTimeout(() => p.classList.remove('pool-pulse'), 600); }
      }, t);
      // Dev dot + pool dot turn green simultaneously
      setTimeout(() => {
        if (!spActive) return;
        const d = document.getElementById(story.dev);
        const p = document.getElementById(story.pool);
        if (d && story.dc !== 'x') { d.className=`d ${story.dc} dot-arrive`; setTimeout(()=>d.classList.remove('dot-arrive'),420); }
        if (p) p.className = 'sdot done';   // pool dot goes green at same moment
      }, t + 80);
      // QA dot arrives after dev
      if (story.qc !== 'x') setTimeout(() => {
        if (!spActive) return;
        const q = document.getElementById(story.qa);
        if (q) { q.className=`d ${story.qc} dot-arrive`; setTimeout(()=>q.classList.remove('dot-arrive'),420); }
      }, t + 80 + QA_LAG);
    });

    const fillDone = stories.length * STORY_MS + 80 + QA_LAG + 120;
    spTimer = setTimeout(() => {
      if (!spActive) return;
      // Show status icon
      const st = document.getElementById(SP_STATUS[si]);
      if (st) { st.style.transition='opacity .3s'; st.style.opacity='1'; }
      // Desaturate row, then move to next sprint
      spTimer = setTimeout(() => {
        if (!spActive) return;
        const row = document.getElementById(SP_ROWS[si]);
        if (row) { row.style.transition='filter .6s ease'; row.style.filter='saturate(0.3)'; }
        spTimer = setTimeout(() => spPhase3(si + 1), 700);
      }, 700);
    }, fillDone);
  }

  // ── Planning: backlog → this release animation ──
  const PLAN_SLOTS = ['ps0','ps1','ps2','ps3'];
  const PLAN_BL    = ['pb0','pb1','pb2','pb3'];
  let planStep = 0;
  let planTimer = null;

  function planMoveNext() {
    if (planStep < PLAN_SLOTS.length) {
      const slot = document.getElementById(PLAN_SLOTS[planStep]);
      const bl   = document.getElementById(PLAN_BL[planStep]);

      // Item arrives in "this release"
      slot.className = 'f on plan-slot arriving';
      setTimeout(() => slot.classList.remove('arriving'), 500);

      // Backlog item departs
      bl.classList.add('departing');
      setTimeout(() => {
        bl.classList.remove('departing');
        bl.style.opacity = '0';
      }, 320);

      planStep++;
      planTimer = setTimeout(planMoveNext, 750);
    } else {
      // All moved — pause then reset
      planTimer = setTimeout(planReset, 2200);
    }
  }

  // ── UAT animation ──
  let uatActive = false;
  let uatTimer  = null;
  const FILL_DUR = 1100, ROW_GAP = 380;

  function uatRestartAnim() {
    uatActive = true;
    clearTimeout(uatTimer);
    uatFullReset();
    uatTimer = setTimeout(() => uatAnimRow(0), 400);
  }

  function uatFreeze() {
    uatActive = false;
    clearTimeout(uatTimer);
    // Static: all 4 rows complete
    [0,1,2,3].forEach(i => {
      const fi  = document.getElementById(`ufi${i}`);
      const uf  = document.getElementById(`uf${i}`);
      const uck = document.getElementById(`uck${i}`);
      if (fi)  fi.classList.remove('dim');
      if (uf)  { uf.style.transition = 'none'; uf.style.width = '100%'; }
      if (uck) { uck.textContent = '✓'; uck.style.color = '#22c55e'; }
    });
  }

  function uatFullReset() {
    [0,1,2,3].forEach(i => {
      const fi  = document.getElementById(`ufi${i}`);
      const uf  = document.getElementById(`uf${i}`);
      const uck = document.getElementById(`uck${i}`);
      if (fi)  fi.classList.add('dim');
      if (uf)  { uf.style.transition = 'none'; uf.style.width = '0'; }
      if (uck) { uck.textContent = '–'; uck.style.color = 'rgba(0,0,0,.3)'; }
    });
  }

  function uatAnimRow(i) {
    if (!uatActive) return;
    if (i >= 4) {
      uatTimer = setTimeout(() => {
        if (!uatActive) return;
        uatFullReset();
        uatTimer = setTimeout(() => uatAnimRow(0), 400);
      }, 1800);
      return;
    }
    const fi  = document.getElementById(`ufi${i}`);
    const uf  = document.getElementById(`uf${i}`);
    const uck = document.getElementById(`uck${i}`);
    if (fi)  fi.classList.remove('dim');
    if (uck) { uck.textContent = '⏱'; uck.style.color = '#06b6d4'; }
    // Double rAF ensures browser processes transition:none before enabling the transition
    if (uf) requestAnimationFrame(() => requestAnimationFrame(() => {
      if (!uatActive) return;
      uf.style.transition = `width ${FILL_DUR}ms ease-in-out`;
      uf.style.width = '100%';
    }));
    uatTimer = setTimeout(() => {
      if (!uatActive) return;
      if (uck) { uck.textContent = '✓'; uck.style.color = '#22c55e'; }
      uatTimer = setTimeout(() => uatAnimRow(i + 1), ROW_GAP);
    }, FILL_DUR + 180);
  }

  // ── Delivery animation ──
  let delActive = false;
  let delTimer  = null;

  function delRestartAnim() {
    delActive = true;
    clearTimeout(delTimer);
    delFullReset();
    delTimer = setTimeout(delAnim, 500);
  }

  const DEL_RING_DUR = 950;

  function delCleanClasses(id) {
    const el = document.getElementById(id);
    if (el) el.classList.remove('inactive','slot-deploying','slot-live-blue','slot-live-green');
  }

  function delHideRings() {
    ['st-b-ring','pr-b-ring'].forEach(id => {
      const el = document.getElementById(id); if (el) el.style.display = 'none';
    });
  }

  function delFreeze() {
    delActive = false;
    clearTimeout(delTimer);
    delHideRings();
    ['st-a','st-b','pr-a','pr-b'].forEach(delCleanClasses);
    // Static: both envs on v2.5 — green active (solid green border), blue dim
    document.getElementById('st-a').classList.add('inactive');
    document.getElementById('st-b').classList.add('slot-live-green');
    document.getElementById('st-b-ver').textContent = 'v2.5';
    document.getElementById('pr-a').classList.add('inactive');
    document.getElementById('pr-b').classList.add('slot-live-green');
    document.getElementById('pr-b-ver').textContent = 'v2.5';
  }

  function delFullReset() {
    delHideRings();
    ['st-a','st-b','pr-a','pr-b'].forEach(delCleanClasses);
    // Initial: blue slots live (blue border), green slots inactive
    document.getElementById('st-a').classList.add('slot-live-blue');
    document.getElementById('st-b').classList.add('inactive');
    document.getElementById('st-b-ver').textContent = '–';
    document.getElementById('pr-a').classList.add('slot-live-blue');
    document.getElementById('pr-b').classList.add('inactive');
    document.getElementById('pr-b-ver').textContent = '–';
  }

  // Animate deployment ring: dashed border → solid ring draws clockwise → slot goes live
  function deploySlot(slotId, ringId, onDone) {
    const slot   = document.getElementById(slotId);
    const svg    = document.getElementById(ringId);
    const rectEl = svg.querySelector('rect');
    // Phase 1: show dashed border (slot still inactive/dim)
    slot.classList.add('slot-deploying');
    delTimer = setTimeout(() => {
      if (!delActive) return;
      // Phase 2: solid ring draws over the dashed border
      const { width, height } = slot.getBoundingClientRect();
      const rx = Math.min(8, parseFloat(getComputedStyle(slot).borderRadius) || 6);
      const W = width + 4, H = height + 4;
      svg.setAttribute('width', W); svg.setAttribute('height', H);
      rectEl.setAttribute('x', 1.5); rectEl.setAttribute('y', 1.5);
      rectEl.setAttribute('width', W - 3); rectEl.setAttribute('height', H - 3);
      rectEl.setAttribute('rx', rx); rectEl.setAttribute('ry', rx);
      const perim = 2 * (W + H);
      rectEl.style.transition = 'none';
      rectEl.style.strokeDasharray = perim;
      rectEl.style.strokeDashoffset = perim;
      svg.style.display = '';
      rectEl.getBoundingClientRect(); // force reflow before transition
      rectEl.style.transition = `stroke-dashoffset ${DEL_RING_DUR}ms linear`;
      rectEl.style.strokeDashoffset = 0;
      delTimer = setTimeout(() => {
        if (!delActive) return;
        // Ring complete — flip slot to live state
        svg.style.display = 'none';
        slot.classList.remove('slot-deploying', 'inactive');
        slot.classList.add('slot-live-green');
        onDone();
      }, DEL_RING_DUR + 60);
    }, 320);
  }

  function delAnim() {
    if (!delActive) return;
    // Step 1: deploy v2.5 to staging green slot
    document.getElementById('st-b-ver').textContent = 'v2.5';
    deploySlot('st-b', 'st-b-ring', () => {
      // Staging done — dim the blue slot
      document.getElementById('st-a').classList.remove('slot-live-blue');
      document.getElementById('st-a').classList.add('inactive');
      // Step 2: deploy v2.5 to production green slot
      delTimer = setTimeout(() => {
        if (!delActive) return;
        document.getElementById('pr-b-ver').textContent = 'v2.5';
        deploySlot('pr-b', 'pr-b-ring', () => {
          document.getElementById('pr-a').classList.remove('slot-live-blue');
          document.getElementById('pr-a').classList.add('inactive');
          // Pause then loop
          delTimer = setTimeout(() => {
            if (!delActive) return;
            delFullReset();
            delTimer = setTimeout(delAnim, 600);
          }, 2800);
        });
      }, 900);
    });
  }

  function planReset() {
    PLAN_SLOTS.forEach(id => {
      const el = document.getElementById(id);
      el.className = 'f off plan-slot';
    });
    PLAN_BL.forEach(id => {
      const el = document.getElementById(id);
      el.className = 'f off plan-bl';
      el.style.opacity = '';
    });
    planStep = 0;
    planTimer = setTimeout(planMoveNext, 550);
  }

  // ── Hover tooltip ──
  const tipEl = document.createElement('div');
  tipEl.id = 'tip';
  document.body.appendChild(tipEl);

  let _tipTarget = null;
  document.addEventListener('mousemove', e => {
    let el = e.target.closest('[data-tip]');
    // rc-tip-overlay has pointer-events:none so clicks pass through — check its bounds manually
    if (!el) {
      const rc = document.getElementById('rc-tip-overlay');
      if (rc) {
        const r = rc.getBoundingClientRect();
        if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) el = rc;
      }
    }
    if (el) {
      if (el !== _tipTarget) {
        _tipTarget = el;
        tipEl.textContent = el.dataset.tip;
      }
      tipEl.style.display = 'block';
      const x = e.clientX + 16, y = e.clientY - 36;
      tipEl.style.left = Math.min(x, window.innerWidth  - tipEl.offsetWidth  - 10) + 'px';
      tipEl.style.top  = Math.max(8, Math.min(y, window.innerHeight - tipEl.offsetHeight - 10)) + 'px';
    } else {
      _tipTarget = null;
      tipEl.style.display = 'none';
    }
  });
</script>
</body>
