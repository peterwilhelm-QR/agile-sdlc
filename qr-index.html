<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agile Release Cycle</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --qr-charcoal:    #1E1E1E;
      --qr-lava:        #FF603A;
      --qr-sand:        #EAE7E0;
      --qr-white:       #FFFFFF;
      --qr-burgundy:    #341B24;
      --qr-forest:      #183034;
      --qr-deep-sea:    #181934;
      --qr-sand-30:     #F4F3EF;
      --qr-sand-50:     #EDECE4;
      --qr-charcoal-30: #8F8F8F;
      --qr-charcoal-50: #535353;
      --qr-font-headline: 'Poppins', Arial, Helvetica, sans-serif;
      --qr-font-body:     'Poppins', Arial, Helvetica, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--qr-sand-30);
      font-family: var(--qr-font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 clamp(32px, 4vw, 64px) clamp(48px, 6vw, 80px);
    }

    .diagram {
      position: relative;
      width: 100%;
      max-width: 94vw;
    }

    .row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* ── Arrows between stages ── */
    .arrow {
      font-size: clamp(.8rem, 1.2vw, 1.4rem);
      color: var(--qr-charcoal-30);
      padding: 0 clamp(6px, 1vw, 18px);
      padding-top: clamp(24px, 3.2vw, 48px);
      flex-shrink: 0;
      user-select: none;
    }

    /* ── Stage column ── */
    .stage {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      filter: grayscale(1) opacity(0.35);
      transition: filter 0.3s ease;
      user-select: none;
    }
    .stage:hover  { filter: grayscale(0.5) opacity(0.65); }
    .stage.active { filter: none; }

    /* ── Phase circle ── */
    .circ {
      width: clamp(54px, 6vw, 150px);
      height: clamp(54px, 6vw, 150px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(.9rem, 1.65vw, 2.4rem);
      border: 2px solid transparent;
      transition: border-color .3s, box-shadow .3s;
    }
    .stage.active .circ {
      border-color: rgba(30,30,30,.12);
      box-shadow: 0 0 clamp(16px, 2.5vw, 36px) var(--glow);
    }

    .lbl {
      font-family: var(--qr-font-body);
      font-size: clamp(.6rem, .75vw, 1.5rem);
      font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
      margin-top: clamp(5px, .8vw, 18px);
      color: var(--qr-lava);
    }
    .sub {
      font-family: var(--qr-font-body);
      font-size: clamp(.45rem, .55vw, 1.1rem);
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--qr-charcoal-30);
      margin-top: 3px; margin-bottom: clamp(8px, 1.2vw, 24px);
    }

    /* ── Content card ── */
    .card {
      width: 100%;
      background: var(--qr-sand);
      border: 1px solid rgba(30,30,30,.1);
      border-radius: clamp(8px, 1vw, 16px);
      padding: clamp(10px, 1.2vw, 20px) clamp(8px, 1vw, 16px);
    }

    /* ════════════ PLANNING ════════════ */
    .st-plan { flex: 1.05; --glow: rgba(24,25,52,.5); }
    .st-plan .circ { background: radial-gradient(circle at 36% 32%, #2a2a5a, #181934); } /* Deep Sea */
    .st-plan .lbl  { color: var(--qr-lava); }

    .feat-grid { display: flex; flex-direction: column; gap: clamp(4px, .5vw, 8px); }

    .sect-lbl {
      font-family: var(--qr-font-body);
      font-size: clamp(.42rem, .5vw, .68rem);
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--qr-charcoal-30);
      margin-bottom: 1px;
    }

    .feat-row { display: flex; gap: clamp(4px, .5vw, 8px); }

    .f {
      width: clamp(13px, 1.6vw, 26px);
      height: clamp(13px, 1.6vw, 26px);
      border-radius: 3px;
    }
    .f.on  { background: var(--qr-charcoal); box-shadow: 0 0 5px rgba(30,30,30,.3); }
    .f.off { background: var(--qr-sand-50); border: 1.5px solid rgba(30,30,30,.18); }

    .feat-div {
      height: 1px; background: rgba(30,30,30,.1);
      margin: clamp(3px, .5vw, 7px) 0;
    }

    /* ════════════ SPRINT ════════════ */
    .st-sprint { flex: 2; --glow: rgba(24,49,52,.45); }

    .sprint-head {
      display: flex; align-items: flex-end;
      justify-content: center; gap: clamp(8px, 1.5vw, 24px);
    }

    .sub-stage {
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(3px, .5vw, 8px);
    }

    .circ-sm {
      width: clamp(54px, 6vw, 150px);
      height: clamp(54px, 6vw, 150px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(.9rem, 1.65vw, 2.4rem);
      border: 2px solid transparent;
      transition: border-color .3s, box-shadow .3s;
    }
    .st-sprint.active .dev-c { border-color: rgba(24,48,52,.35); box-shadow: 0 0 18px rgba(24,48,52,.4); }
    .st-sprint.active .qa-c  { border-color: rgba(52,27,36,.35); box-shadow: 0 0 18px rgba(52,27,36,.4); }
    .dev-c { background: radial-gradient(circle at 36% 32%, #265a5f, #183034); } /* Forest */
    .qa-c  { background: radial-gradient(circle at 36% 32%, #5a2f3e, #341B24); } /* Burgundy */

    .swap { font-size: clamp(.9rem, 1.4vw, 1.8rem); color: var(--qr-charcoal-30); padding-bottom: clamp(6px, 1vw, 14px); }

    .dev-lbl { font-size: clamp(.6rem, .75vw, 1.5rem); font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #183034; }
    .qa-lbl  { font-size: clamp(.6rem, .75vw, 1.5rem); font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #341B24; }

    /* Story pool */
    .sp-hidden { opacity: 0; }
    .pool-wrapper { display: flex; gap: clamp(8px, 1.2vw, 20px); align-items: flex-start; margin: 3px 0 2px; }
    .feat-col { display: flex; flex-direction: column; align-items: flex-start; gap: clamp(3px, .45vw, 7px); }
    .pool-dots { display: flex; gap: clamp(2px, .3vw, 5px); }
    .sg-gap { width: clamp(5px, .8vw, 14px); flex-shrink: 0; }
    .sdot { width: clamp(8px, 1vw, 16px); height: clamp(8px, 1vw, 16px); border-radius: 50%; flex-shrink: 0; }
    .sdot.done { background: #22c55e; }
    .sdot.prog { background: #f59e0b; }
    .sdot.fut  { background: var(--qr-sand-50); border: 1px solid rgba(30,30,30,.18); }

    /* Sprint track */
    .track-hdr {
      display: flex; align-items: center; gap: clamp(4px, .6vw, 10px);
      padding: 0 clamp(5px, .7vw, 12px); margin-bottom: clamp(2px, .4vw, 6px);
    }
    .th-sp { width: clamp(44px, 5.5vw, 88px); flex-shrink: 0; }
    .th-col { font-size: clamp(.45rem, .52vw, .72rem); letter-spacing: .08em; text-transform: uppercase; color: var(--qr-charcoal-30); flex: 1; }

    .s-track { display: flex; flex-direction: column; gap: clamp(4px, .5vw, 8px); }

    .s-row {
      display: flex; align-items: center; gap: clamp(4px, .6vw, 10px);
      padding: clamp(4px, .5vw, 8px) clamp(5px, .7vw, 12px);
      border-radius: clamp(5px, .6vw, 10px);
      background: var(--qr-sand-30); border: 1px solid rgba(30,30,30,.1);
      transition: margin-left 0.2s;
    }
    .s-row.live { border-color: rgba(255,96,58,.35); background: rgba(255,96,58,.06); }
    .s-row.sp1 { margin-left: 0; }
    .s-row.sp2 { margin-left: clamp(10px, 1.2vw, 22px); }
    .s-row.sp3 { margin-left: clamp(20px, 2.4vw, 44px); }

    .s-id {
      font-size: clamp(.48rem, .56vw, .78rem); font-weight: 700; letter-spacing: .04em;
      color: var(--qr-charcoal-50); width: clamp(44px, 5.5vw, 88px); flex-shrink: 0;
      white-space: nowrap;
    }

    /* dev dots | divider | qa dots */
    .s-dev { display: flex; gap: clamp(2px, .3vw, 5px); }
    .s-qa  { display: flex; gap: clamp(2px, .3vw, 5px); }
    .s-sep { width: 1px; height: clamp(10px, 1.2vw, 20px); background: rgba(30,30,30,.12); margin: 0 clamp(2px, .4vw, 6px); flex-shrink: 0; }

    .d { width: clamp(7px, .9vw, 14px); height: clamp(7px, .9vw, 14px); border-radius: 50%; }
    .d.g { background: #22c55e; }
    .d.a { background: #f59e0b; }
    .d.x { background: var(--qr-sand-50); border: 1px solid rgba(30,30,30,.18); }

    .s-ok  { font-size: clamp(.65rem, .8vw, 1.1rem); color: #22c55e; margin-left: auto; flex-shrink: 0; }
    .s-wip { font-size: clamp(.65rem, .8vw, 1.1rem); color: var(--qr-lava); margin-left: auto; flex-shrink: 0; }

    .s-more {
      text-align: center; font-size: clamp(.6rem, .75vw, 1rem);
      color: var(--qr-charcoal-30); letter-spacing: .22em;
      margin-left: clamp(20px, 2.5vw, 44px);
    }

    /* ════════════ UAT ════════════ */
    .st-uat { flex: 1.05; --glow: rgba(30,30,30,.45); }
    .st-uat .circ { background: radial-gradient(circle at 36% 32%, #3a3a3a, #1E1E1E); } /* Charcoal */
    .st-uat .lbl  { color: var(--qr-lava); }

    .uat-rows { display: flex; flex-direction: column; gap: clamp(4px, .6vw, 10px); }
    .uat-row {
      display: flex; align-items: center; gap: clamp(4px, .6vw, 10px);
      padding: clamp(4px, .5vw, 8px) clamp(5px, .7vw, 12px);
      border-radius: clamp(5px, .6vw, 10px);
      background: var(--qr-sand-30); border: 1px solid rgba(30,30,30,.1);
    }
    .fi {
      width: clamp(9px, 1.1vw, 18px); height: clamp(9px, 1.1vw, 18px);
      border-radius: 2px; flex-shrink: 0; background: var(--qr-charcoal);
    }
    .fi.dim { opacity: .2; }
    .uat-bar { flex: 1; height: clamp(4px, .5vw, 8px); border-radius: 3px; background: rgba(30,30,30,.1); overflow: hidden; }
    .uat-fill { height: 100%; border-radius: 3px; background: var(--qr-lava); transition: width 1.1s ease-in-out; }
    .ck { font-size: clamp(.6rem, .75vw, 1rem); flex-shrink: 0; }
    .ck.ok { color: var(--qr-lava); }
    .ck.w  { color: #f59e0b; }
    .ck.no { color: rgba(30,30,30,.25); }

    /* ════════════ DELIVERY ════════════ */
    .st-del { flex: 1.05; --glow: rgba(255,96,58,.45); }
    .st-del .circ { background: radial-gradient(circle at 36% 32%, #FF603A, #341B24); } /* Lava → Burgundy */
    .st-del .lbl  { color: var(--qr-lava); }

    .del-inner {
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(10px, 1.4vw, 22px); padding: 4px 0;
    }
    .ver {
      display: flex; align-items: center; gap: clamp(5px, .7vw, 12px);
      font-family: monospace; font-size: clamp(.65rem, .85vw, 1.2rem);
    }
    .v-old { color: var(--qr-charcoal-30); text-decoration: line-through; }
    .v-arr { color: var(--qr-lava); }
    .v-new { color: var(--qr-lava); font-weight: 700; }

    /* ── Blue/Green deployment slots ── */
    .bgd-envs { display:flex; flex-direction:column; gap:clamp(5px,.7vw,10px); width:100%; }
    .bgd-env  { display:flex; flex-direction:column; gap:clamp(2px,.3vw,4px); }
    .bgd-lbl  { font-size:clamp(.42rem,.5vw,.7rem); letter-spacing:.14em; text-transform:uppercase; color:var(--qr-charcoal-30); }
    .bgd-slots { display:flex; gap:clamp(4px,.5vw,8px); }
    .bgd-slot {
      flex:1; display:flex; align-items:center; gap:clamp(3px,.4vw,6px);
      padding:clamp(3px,.4vw,6px) clamp(4px,.55vw,8px);
      border-radius:clamp(4px,.5vw,8px); border:1.5px solid rgba(30,30,30,.15);
      font-family:monospace; font-size:clamp(.5rem,.62vw,.9rem); font-weight:600;
      color:var(--qr-charcoal-50); transition:filter .5s ease, border-color .3s ease;
      position:relative; overflow:visible;
    }
    .bgd-slot.inactive        { filter:saturate(0.12) opacity(0.4); }
    .bgd-slot.slot-live-blue  { border-color:#3b82f6; }
    .bgd-slot.slot-live-green { border-color:#22c55e; }
    .bgd-slot.slot-deploying  { border-style:dashed; border-color:#22c55e; }
    .bgd-dot { width:clamp(6px,.8vw,12px); height:clamp(6px,.8vw,12px); border-radius:50%; flex-shrink:0; }
    .bgd-dot.blue  { background:#3b82f6; }
    .bgd-dot.green { background:#22c55e; }
    .deploy-ring { position:absolute; top:-2px; left:-2px; pointer-events:none; display:none; overflow:visible; }
    .deploy-ring rect { fill:none; stroke:#22c55e; stroke-width:2.5; stroke-linecap:round; }

    /* ── Hover tooltip ── */
    #tip {
      position:fixed; display:none; pointer-events:none; z-index:9999;
      background:rgba(30,30,30,.95); color:var(--qr-sand);
      font-family:var(--qr-font-body);
      font-size:clamp(.6rem,.68vw,.8rem); line-height:1.5;
      padding:6px 11px; border-radius:7px; max-width:230px;
      box-shadow:0 3px 12px rgba(0,0,0,.25);
    }
    [data-tip] { cursor:default; }

    /* ── Team callout ── */
    .callout {
      width: 100%;
      max-width: 94vw;
      margin: clamp(48px, 6vw, 96px) auto 0;
      opacity: 0;
      transition: opacity .3s ease;
      pointer-events: none;
      min-height: 260px;
    }
    .callout.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .callout-roles {
      display: flex;
      gap: clamp(12px, 1.5vw, 28px);
      align-items: stretch;
    }

    .role-card {
      flex: 1;
      background: var(--qr-sand);
      border: 1px solid rgba(30,30,30,.1);
      border-radius: clamp(8px, 1vw, 16px);
      padding: clamp(14px, 1.5vw, 28px);
    }

    .role-name {
      font-family: var(--qr-font-headline);
      font-size: clamp(.85rem, 1vw, 1.4rem);
      font-weight: 400;
      letter-spacing: .02em;
      margin-bottom: clamp(10px, 1vw, 18px);
      padding-bottom: clamp(8px, .8vw, 14px);
      border-bottom: 1px solid rgba(30,30,30,.1);
    }

    .role-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: clamp(6px, .7vw, 12px);
    }

    .role-items li {
      font-size: clamp(.6rem, .72vw, 1rem);
      color: var(--qr-charcoal-50);
      line-height: 1.6;
      padding-left: clamp(10px, 1vw, 16px);
      position: relative;
    }

    .role-items li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--qr-lava);
    }

    /* ── Stage header normalisation ── */
    .stage-hd {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      min-height: clamp(90px, 10vw, 180px);
      width: 100%;
    }

    /* ── SVG overlay ── */
    /* ── Logo header ── */
    .qr-header {
      width: 100%;
      max-width: 94vw;
      padding: clamp(18px, 2.2vw, 26px) 0 clamp(16px, 2vw, 22px);
      border-bottom: 1px solid rgba(30,30,30,.1);
      margin-bottom: clamp(28px, 3.5vw, 52px);
    }
    .qr-logo {
      height: clamp(24px, 2.6vw, 36px);
      width: auto;
      display: block;
    }

    /* ── SVG overlay ── */
    .loops-svg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; overflow: visible; z-index: 1;
    }
    @keyframes dash-flow { to { stroke-dashoffset: -22; } }

    /* ── Planning backlog → release animation ── */
    @keyframes arrive-item {
      0%   { transform: translateY(14px) scale(0.3); opacity: 0; }
      65%  { transform: translateY(-3px) scale(1.15); opacity: 1; }
      100% { transform: translateY(0)    scale(1);    opacity: 1; }
    }
    @keyframes depart-item {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(0.1); opacity: 0; }
    }
    .arriving           { animation: arrive-item .45s cubic-bezier(.22,1.2,.36,1) forwards; }
    .plan-bl.departing  { animation: depart-item .3s ease-in forwards; }

    @keyframes pool-arrive {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .sdot.pool-arrive { animation: pool-arrive .35s cubic-bezier(.22,1.2,.36,1) forwards; }

    /* ── Sprint dot animations ── */
    @keyframes dot-arrive {
      0%   { transform: scale(0.15); opacity: 0; }
      65%  { transform: scale(1.3);  opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes pool-pulse {
      0%   { transform: scale(1);   }
      45%  { transform: scale(1.55); }
      100% { transform: scale(1);   }
    }
    .d.dot-arrive    { animation: dot-arrive .38s cubic-bezier(.22,1.2,.36,1) forwards; }
    .sdot.pool-pulse { animation: pool-pulse .55s ease-out; }
  </style>
</head>

  let current = 'planning';

  function activate(id) {
    if (current === id) return;
    const prev = current;
    current = id;
    document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
    document.getElementById('stage-' + id).classList.add('active');
    if (prev === 'planning') planFreeze();
    if (id  === 'planning') planRestartAnim();
    if (prev === 'sprint')   sprintFreeze();
    if (id  === 'sprint')   sprintRestartAnim();
    if (prev === 'uat')     uatFreeze();
    if (id  === 'uat')     uatRestartAnim();
    if (prev === 'delivery') delFreeze();
    if (id  === 'delivery') delRestartAnim();
    renderCallout(id);
    drawLoops();
  }

  function planFreeze() {
    clearTimeout(planTimer);
    planTimer = null;
    PLAN_SLOTS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'f on plan-slot';
    });
    PLAN_BL.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.opacity = '0';
    });
  }

  function planRestartAnim() {
    clearTimeout(planTimer);
    PLAN_SLOTS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'f off plan-slot';
    });
    PLAN_BL.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.className = 'f off plan-bl'; el.style.opacity = ''; }
    });
    planStep = 0;
    planTimer = setTimeout(planMoveNext, 600);
  }

  function renderCallout(id) {
    const data = callouts[id];
    const callout = document.getElementById('callout');
    const rolesEl = document.getElementById('callout-roles');

    if (!data) {
      callout.classList.remove('visible');
      return;
    }

    rolesEl.innerHTML = data.roles.map(role => `
      <div class="role-card">
        <div class="role-name" style="color:${data.color}">${role.name}</div>
        <ul class="role-items">
          ${role.items.map(item => `<li>${item}</li>`).join('')}
        </ul>
      </div>
    `).join('');

    callout.classList.add('visible');
  }

  // Initial state on load
  window.addEventListener('load', () => {

    delFreeze();

  function mk(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }

  function arrowPoly(x, y, dir, col) {
    const p = mk('polygon'), s = 5;
    const pts = {
      right: `${x-s},${y-s} ${x+s},${y} ${x-s},${y+s}`,
      left:  `${x+s},${y-s} ${x-s},${y} ${x+s},${y+s}`,
      up:    `${x-s},${y+s} ${x},${y-s} ${x+s},${y+s}`,
      down:  `${x-s},${y-s} ${x},${y+s} ${x+s},${y-s}`,
    };
    p.setAttribute('points', pts[dir]);
    p.setAttribute('fill', col);
    return p;
  }

  function drawLoops() {
    const svg = document.getElementById('loops-svg');
    svg.innerHTML = '';
    const dRect = document.getElementById('diagram').getBoundingClientRect();

    const L = id => document.getElementById(id).getBoundingClientRect().left  - dRect.left;
    const R = id => document.getElementById(id).getBoundingClientRect().right - dRect.left;
    const T = id => document.getElementById(id).getBoundingClientRect().top   - dRect.top;
    const B = id => document.getElementById(id).getBoundingClientRect().bottom - dRect.top;

    // ── Release cycle oval ──
    const lx = L('stage-planning') - 12;
    const rx = R('stage-delivery') + 12;
    const ty = T('stage-planning') - 22;
    const by = Math.max(B('stage-planning'), B('stage-sprint'), B('stage-uat'), B('stage-delivery')) + 22;
    const bul = 32;
    const mx  = (lx + rx) / 2;

    const oval = mk('path');
    oval.setAttribute('d', `M ${lx} ${ty} C ${lx} ${ty-bul},${rx} ${ty-bul},${rx} ${ty}
                             L ${rx} ${by} C ${rx} ${by+bul},${lx} ${by+bul},${lx} ${by} Z`);
    oval.setAttribute('fill', 'none');
    oval.setAttribute('stroke', 'rgba(255,96,58,.35)');
    oval.setAttribute('stroke-width', '1.5');
    oval.setAttribute('stroke-dasharray', '7 4');
    svg.appendChild(oval);

    // arrows on oval
    svg.appendChild(arrowPoly(mx, ty-bul+5, 'right', 'rgba(255,96,58,.55)'));
    svg.appendChild(arrowPoly(mx, by+bul-5, 'left',  'rgba(255,96,58,.55)'));

    // release cycle label
    const labelSize = Math.round(Math.min(Math.max(12, window.innerWidth * 0.009), 26));
    const rl = mk('text');
    rl.setAttribute('x', mx); rl.setAttribute('y', ty-bul-10);
    rl.setAttribute('text-anchor', 'middle'); rl.setAttribute('font-size', labelSize);
    rl.setAttribute('font-weight', '600'); rl.setAttribute('letter-spacing', '2');
    rl.setAttribute('fill', '#FF603A');
    rl.setAttribute('font-family', "'Poppins', sans-serif");
    rl.textContent = 'RELEASE CYCLE';
    svg.appendChild(rl);

    // HTML overlay for the RELEASE CYCLE tooltip (SVG pointer-events can't pierce pointer-events:none on the SVG root)
    const RC_TIP = 'Release cycle — a product grows through a planned sequence of releases, each scoped to deliver the highest-value capabilities to the business and its customers as early as possible';
    let rcOverlay = document.getElementById('rc-tip-overlay');
    if (!rcOverlay) {
      rcOverlay = document.createElement('div');
      rcOverlay.id = 'rc-tip-overlay';
      rcOverlay.style.cssText = 'position:absolute;pointer-events:none;z-index:2;';
      rcOverlay.dataset.tip = RC_TIP;
      document.getElementById('diagram').appendChild(rcOverlay);
    }
    const approxW = labelSize * 9.2;
    rcOverlay.style.left   = (mx - approxW / 2) + 'px';
    rcOverlay.style.top    = (ty - bul - labelSize - 18) + 'px';
    rcOverlay.style.width  = approxW + 'px';
    rcOverlay.style.height = (labelSize + 14) + 'px';

  }

  // ── Sprint animation ──

  function sprintFreeze() {

  function spFullReset() {
    // Hide seeds individually via class
    POOL_GROUPS.forEach(({seedId}) => {
      const el = document.getElementById(seedId);
      if (el) el.classList.add('sp-hidden');
    });
    // Hide and reset pool dots
    POOL_GROUPS.forEach(({ids}) => ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'sdot fut sp-hidden';
    }));
    SP_STORIES.forEach((stories, si) => {
      stories.forEach(s => {
        const d=document.getElementById(s.dev); if(d) d.className='d x sp-hidden';
        const q=document.getElementById(s.qa);  if(q) q.className='d x sp-hidden';
      });
      const st=document.getElementById(SP_STATUS[si]); if(st){st.style.opacity='0';st.style.transition='';}
      const row=document.getElementById(SP_ROWS[si]);   if(row){row.style.filter='';row.style.transition='';}
    });
  }

  // Phase 1: feature seeds appear one by one
  function spPhase1() {
    if (!spActive) return;
    POOL_GROUPS.forEach(({seedId}, i) => {
      setTimeout(() => {
        if (!spActive) return;
        const el = document.getElementById(seedId);
        if (el) {
          el.classList.remove('sp-hidden');
          el.classList.add('arriving');
          setTimeout(() => el.classList.remove('arriving'), 450);
        }
      }, i * 160);
    });
    spTimer = setTimeout(spPhase2, POOL_GROUPS.length * 160 + 480);
  }

  // Phase 2: each seed blooms into its story dots
  function spPhase2() {
    if (!spActive) return;
    let delay = 0;
    POOL_GROUPS.forEach(({seedId, ids}, gi) => {
      setTimeout(() => {
        if (!spActive) return;
        const seed = document.getElementById(seedId);
        if (seed) { seed.classList.add('pool-pulse'); setTimeout(() => seed.classList.remove('pool-pulse'), 600); }
        ids.forEach((id, di) => {
          setTimeout(() => {
            if (!spActive) return;
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('sp-hidden');
            el.classList.add('pool-arrive');
            setTimeout(() => el.classList.remove('pool-arrive'), 420);
          }, di * 150);
        });
      }, delay);
      delay += ids.length * 150 + 360;
    });
    spTimer = setTimeout(() => spPhase3(0), delay + 300);
  }

  // Phase 3: fill sprints story-by-story, cross-feature
  function spPhase3(si) {
    if (!spActive) return;
    if (si >= SP_STORIES.length) {
      spTimer = setTimeout(() => {
        if (!spActive) return;
        spFullReset();
        spTimer = setTimeout(spPhase1, 600);
      }, 1800);
      return;
    }
    const stories = SP_STORIES[si];
    const STORY_MS = 460, QA_LAG = 240;

    stories.forEach((story, i) => {
      const t = i * STORY_MS;
      // Pool dot pulses first
      setTimeout(() => {
        if (!spActive) return;
        const p = document.getElementById(story.pool);
        if (p) { p.classList.add('pool-pulse'); setTimeout(() => p.classList.remove('pool-pulse'), 600); }
      }, t);
      // Dev dot + pool dot turn green simultaneously
      setTimeout(() => {
        if (!spActive) return;
        const d = document.getElementById(story.dev);
        const p = document.getElementById(story.pool);
        if (d && story.dc !== 'x') { d.className=`d ${story.dc} dot-arrive`; setTimeout(()=>d.classList.remove('dot-arrive'),420); }
        if (p) p.className = 'sdot done';   // pool dot goes green at same moment
      }, t + 80);
      // QA dot arrives after dev
      if (story.qc !== 'x') setTimeout(() => {
        if (!spActive) return;
        const q = document.getElementById(story.qa);
        if (q) { q.className=`d ${story.qc} dot-arrive`; setTimeout(()=>q.classList.remove('dot-arrive'),420); }
      }, t + 80 + QA_LAG);
    });

    const fillDone = stories.length * STORY_MS + 80 + QA_LAG + 120;
    spTimer = setTimeout(() => {
      if (!spActive) return;
      // Show status icon
      const st = document.getElementById(SP_STATUS[si]);
      if (st) { st.style.transition='opacity .3s'; st.style.opacity='1'; }
      // Desaturate row, then move to next sprint
      spTimer = setTimeout(() => {
        if (!spActive) return;
        const row = document.getElementById(SP_ROWS[si]);
        if (row) { row.style.transition='filter .6s ease'; row.style.filter='saturate(0.3)'; }
        spTimer = setTimeout(() => spPhase3(si + 1), 700);
      }, 700);
    }, fillDone);
  }

  // ── Planning: backlog → this release animation ──
  const PLAN_SLOTS = ['ps0','ps1','ps2','ps3'];
  const PLAN_BL    = ['pb0','pb1','pb2','pb3'];
  let planStep = 0;
  let planTimer = null;

  function planMoveNext() {
    if (planStep < PLAN_SLOTS.length) {
      const slot = document.getElementById(PLAN_SLOTS[planStep]);
      const bl   = document.getElementById(PLAN_BL[planStep]);

      // Item arrives in "this release"
      slot.className = 'f on plan-slot arriving';
      setTimeout(() => slot.classList.remove('arriving'), 500);

      // Backlog item departs
      bl.classList.add('departing');
      setTimeout(() => {
        bl.classList.remove('departing');
        bl.style.opacity = '0';
      }, 320);

      planStep++;
      planTimer = setTimeout(planMoveNext, 750);
    } else {
      // All moved — pause then reset
      planTimer = setTimeout(planReset, 2200);
    }
  }

  // Animate deployment ring: dashed border → solid ring draws clockwise → slot goes live
  function deploySlot(slotId, ringId, onDone) {
    const slot   = document.getElementById(slotId);
    const svg    = document.getElementById(ringId);
    const rectEl = svg.querySelector('rect');
    // Phase 1: show dashed border (slot still inactive/dim)
    slot.classList.add('slot-deploying');
    delTimer = setTimeout(() => {
      if (!delActive) return;
      // Phase 2: solid ring draws over the dashed border
      const { width, height } = slot.getBoundingClientRect();
      const rx = Math.min(8, parseFloat(getComputedStyle(slot).borderRadius) || 6);
      const W = width + 4, H = height + 4;
      svg.setAttribute('width', W); svg.setAttribute('height', H);
      rectEl.setAttribute('x', 1.5); rectEl.setAttribute('y', 1.5);
      rectEl.setAttribute('width', W - 3); rectEl.setAttribute('height', H - 3);
      rectEl.setAttribute('rx', rx); rectEl.setAttribute('ry', rx);
      const perim = 2 * (W + H);
      rectEl.style.transition = 'none';
      rectEl.style.strokeDasharray = perim;
      rectEl.style.strokeDashoffset = perim;
      svg.style.display = '';
      rectEl.getBoundingClientRect(); // force reflow before transition
      rectEl.style.transition = `stroke-dashoffset ${DEL_RING_DUR}ms linear`;
      rectEl.style.strokeDashoffset = 0;
      delTimer = setTimeout(() => {
        if (!delActive) return;
        // Ring complete — flip slot to live state
        svg.style.display = 'none';
        slot.classList.remove('slot-deploying', 'inactive');
        slot.classList.add('slot-live-green');
        onDone();
      }, DEL_RING_DUR + 60);
    }, 320);
  }

  function delAnim() {
    if (!delActive) return;
    // Step 1: deploy v2.5 to staging green slot
    document.getElementById('st-b-ver').textContent = 'v2.5';
    deploySlot('st-b', 'st-b-ring', () => {
      // Staging done — dim the blue slot
      document.getElementById('st-a').classList.remove('slot-live-blue');
      document.getElementById('st-a').classList.add('inactive');
      // Step 2: deploy v2.5 to production green slot
      delTimer = setTimeout(() => {
        if (!delActive) return;
        document.getElementById('pr-b-ver').textContent = 'v2.5';
        deploySlot('pr-b', 'pr-b-ring', () => {
          document.getElementById('pr-a').classList.remove('slot-live-blue');
          document.getElementById('pr-a').classList.add('inactive');
          // Pause then loop
          delTimer = setTimeout(() => {
            if (!delActive) return;
            delFullReset();
            delTimer = setTimeout(delAnim, 600);
          }, 2800);
        });
      }, 900);
    });
  }

  function planReset() {
    PLAN_SLOTS.forEach(id => {
      const el = document.getElementById(id);
      el.className = 'f off plan-slot';
    });
    PLAN_BL.forEach(id => {
      const el = document.getElementById(id);
      el.className = 'f off plan-bl';
      el.style.opacity = '';
    });
    planStep = 0;
    planTimer = setTimeout(planMoveNext, 550);
  }

  // ── Hover tooltip ──
  const tipEl = document.createElement('div');
  tipEl.id = 'tip';
  document.body.appendChild(tipEl);

  let _tipTarget = null;
  document.addEventListener('mousemove', e => {
    let el = e.target.closest('[data-tip]');
    // rc-tip-overlay has pointer-events:none so clicks pass through — check its bounds manually
    if (!el) {
      const rc = document.getElementById('rc-tip-overlay');
      if (rc) {
        const r = rc.getBoundingClientRect();
        if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) el = rc;
      }
    }
    if (el) {
      if (el !== _tipTarget) {
        _tipTarget = el;
        tipEl.textContent = el.dataset.tip;
      }
      tipEl.style.display = 'block';
      const x = e.clientX + 16, y = e.clientY - 36;
      tipEl.style.left = Math.min(x, window.innerWidth  - tipEl.offsetWidth  - 10) + 'px';
      tipEl.style.top  = Math.max(8, Math.min(y, window.innerHeight - tipEl.offsetHeight - 10)) + 'px';
    } else {
      _tipTarget = null;
      tipEl.style.display = 'none';
    }
  });
</script>
</body>
